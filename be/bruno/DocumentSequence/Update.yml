info:
  name: Update
  type: http
  seq: 4

http:
  method: PUT
  url: '{{API_URL}}/{{DOCUMENT_SEQUENCE_ENDPOINT}}/:id'
  params:
    - name: id
      value: PO
      type: path
  body:
    type: json
    data: |-
      {
        "name": "Purchase Order Updated",
        "prefix": "PO",
        "separator": "-",
        "dateFormat": "YYYYMM",
        "paddingLength": 5,
        "resetCycle": "MONTHLY",
        "isActive": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
