info:
  name: ChangePassword
  type: http
  seq: 6

http:
  method: PUT
  url: "{{API_URL}}/{{AUTH_ENDPOINT}}/change-password"
  body:
    type: json
    data: |-
      {
        "currentPassword": "123456",
        "newPassword": "newpass123",
        "confirmPassword": "newpass123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
